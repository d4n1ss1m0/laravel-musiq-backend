version: "3.9"

services:
  app:
    user: "${UID}:${GID}"
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: musiq_app
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /home/d4n1ss1m0/Музыка:/var/bin
    networks:
      - musiq
    depends_on:
      - db
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=musiq
      - DB_USERNAME=musiq
      - DB_PASSWORD=musiq

  composer:
    image: composer:2
    container_name: musiq_composer
    working_dir: /var/www
    volumes:
      - .:/var/www
    entrypoint: ["composer"]
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - COMPOSER_NO_INTERACTION=1
      - COMPOSER_PREFER_DIST=1
      - HTTP_PROXY=http://host.docker.internal:40000
      - HTTPS_PROXY=http://host.docker.internal:40000

  nginx:
    image: nginx:alpine
    container_name: musiq_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - musiq

  db:
    image: postgres:16
    container_name: musiq_db
    environment:
      POSTGRES_DB: musiq
      POSTGRES_USER: musiq
      POSTGRES_PASSWORD: musiq
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - musiq

networks:
  musiq:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1280

volumes:
  db_data:
